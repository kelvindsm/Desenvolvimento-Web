<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Douglas Matos | Portfólio de Fotografia</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-cream: #fcfaf7;
            --bg-warm-white: #ffffff;
            --text-dark: #2c2c2c;
            --text-muted: #6b6b6b;
            --border-subtle: #e8e3db;
            --accent-gold: #b8965a;
            --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
            --shadow-card: 5px 5px 50px -19px #B08E33;
            --transition-smooth: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-dark);
            letter-spacing: 0.01em;
            line-height: 1.5;
            margin: 0;
            padding: 0;
        }

        /* Tipografia refinada */
        .serif-font {
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
        }

        /* Navegação / Header estilo galeria fina */
        .gallery-header {
            background: var(--bg-warm-white);
            border-bottom: 1px solid var(--border-subtle);
            padding: 2.5rem 1rem 2rem;
            margin-bottom: 2.5rem;
            text-align: center;
            box-shadow: var(--shadow-soft);
        }

        .logo-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.4rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #2c2c2c;
            margin-bottom: 0.25rem;
            line-height: 1.1;
        }

        .tagline {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            font-weight: 400;
            border-top: 1px solid var(--border-subtle);
            display: inline-block;
            padding-top: 0.8rem;
            margin-top: 0.5rem;
        }

        /* Container principal suave */
        .gallery-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        /* Cartão de cada sessão */
        .session-card {
            background: var(--bg-warm-white);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            margin-bottom: 2.5rem;
            padding: 1.5rem 1.5rem 1.2rem;
            box-shadow: var(--shadow-card);
            transition: var(--transition-smooth);
            backdrop-filter: blur(2px);
        }

        .session-card:hover {
            box-shadow: 0 18px 40px -12px rgba(0, 0, 0, 0.06);
            border-color: #d9d0c0;
        }

        .category-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #2c2c2c;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-title i {
            font-size: 1.5rem;
            color: var(--accent-gold);
            opacity: 0.8;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: var(--border-subtle);
            margin: 0.8rem 0 1.2rem;
        }

        /* ========== CARROSSEL REDIMENSIONADO ========== */
        .carousel-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .carousel {
            border-radius: 16px;
            overflow: hidden;
            background: #f5f3ef;
            position: relative;
        }

        .carousel-inner {
            border-radius: 2px;
            background-color: #f5f3ef;
        }

        .carousel-item {
            aspect-ratio: 4 / 3;
            transition: transform 0.6s ease-in-out;
            background-color: #f5f3ef;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(0.98) contrast(1.02);
            transition: filter 0.3s ease;
            background-color: #f5f3ef;
        }

        .carousel-item img:hover {
            filter: brightness(1.02) contrast(1.03);
        }

        /* Controles do carrossel com estilo discreto e elegante */
        .carousel-control-prev,
        .carousel-control-next {
            width: 36px;
            height: 36px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.75);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease, background 0.2s;
            margin: 0 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(3px);
        }

        .carousel:hover .carousel-control-prev,
        .carousel:hover .carousel-control-next {
            opacity: 1;
        }

        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            background-size: 50%;
            filter: invert(30%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(0.4);
        }

        .carousel-control-prev:hover,
        .carousel-control-next:hover {
            background: rgba(255, 255, 255, 0.95);
        }

        /* ========== PLAYER DE ÁUDIO ESTILIZADO ========== */
        .audio-player {
            max-width: 600px;
            margin: 1rem auto 0;
            padding: 0 0.5rem;
        }

        .audio-player audio {
            width: 100%;
            height: 36px;
            border-radius: 20px;
            background: #f9f7f3;
            border: 1px solid var(--border-subtle);
            outline: none;
            filter: sepia(0.1);
            transition: all 0.2s ease;
        }

        .audio-player audio::-webkit-media-controls-panel {
            background-color: #f9f7f3;
        }

        .audio-player audio::-webkit-media-controls-play-button,
        .audio-player audio::-webkit-media-controls-mute-button {
            filter: brightness(0.8);
        }

        .audio-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .audio-label i {
            font-size: 0.9rem;
            color: var(--accent-gold);
        }

        /* Responsividade fina */
        @media (max-width: 768px) {
            .logo-name {
                font-size: 2.6rem;
            }

            .session-card {
                padding: 1.2rem 1rem 1rem;
                margin-bottom: 2rem;
            }

            .category-title {
                font-size: 1.6rem;
            }

            .carousel-wrapper {
                max-width: 100%;
            }

            .audio-player {
                max-width: 100%;
            }

            .carousel-control-prev,
            .carousel-control-next {
                width: 30px;
                height: 30px;
                opacity: 0.85;
            }
        }

        @media (max-width: 480px) {
            .carousel-item {
                aspect-ratio: 3 / 4;
            }
        }

        /* Rodapé sutil */
        .portfolio-footer {
            text-align: center;
            padding: 2rem 1rem 3rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-top: 1px solid var(--border-subtle);
            margin-top: 1rem;
        }

        .contact-line {
            font-size: 0.9rem;
            color: #5c5c5c;
            letter-spacing: 1px;
            margin-top: 0.4rem;
        }

        .contact-line i {
            margin: 0 4px;
            color: var(--accent-gold);
        }
    </style>
</head>

    <!-- Script para pausar carrossel no hover -->
    <script>
        (function () {
            document.querySelectorAll('.carousel').forEach(function (carouselEl) {
                carouselEl.addEventListener('mouseenter', function () {
                    const carouselInstance = bootstrap.Carousel.getInstance(carouselEl);
                    if (carouselInstance) {
                        carouselInstance.pause();
                    }
                });
                carouselEl.addEventListener('mouseleave', function () {
                    const carouselInstance = bootstrap.Carousel.getInstance(carouselEl);
                    if (carouselInstance) {
                        carouselInstance.cycle();
                    }
                });
            });
        })();
    </script>
